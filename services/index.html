---
layout: default
title: Services
---

<section class="ts-2 section-banner" style="background-image: url('/assets/images/sigmund-Im_cQ6hQo10-unsplash.jpg');">
  <div class="table" style="width: 100%; height: 100%;">
    <div class="middle">
      <div class="main-page">
        <h1 data-aos="zoom-in-up" data-aos-duration="800" class="white m-0">Services</h1>
      </div>
    </div>
  </div>
</section>

<section>
  <div class="main-page">
    <div class="main-spacing">
      <div class="col-4">
        {% assign sorted_services = site.services | sort: "order" %}
        {% for service in sorted_services %}
        <div class="flex-wrap-bottom-div">
          <a class="m-0" href="{{ service.url }}">
            <img src="/assets/images/{{ service.hero_image }}"
                 class="projects-img mb-q br-5 img-hover"
                 alt="{{ service.title }}"
                 title="{{ service.title }}"
                 loading="lazy">
            <h4>{{ service.title }}</h4>
            <p class="fs-14">{{ service.summary }}</p>
          </a>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>
</section>

<section>
  <div class="bottom-cta">
    <div data-aos="zoom-in-up" data-aos-duration="800" class="main-page">
      <div class="main-padding mt">
        <div class="auto text-center">
          <h3 class="white">Get in touch with one of our team today</h3>
          <a class="btn pink-btn mt-es mb-0" href="https://open-banking.atlassian.net/servicedesk/customer/portal/1">Contact Us</a>
        </div>
      </div>
    </div>
  </div>
</section>
