name: CI — Playwright Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Run Playwright functional tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true  # runs bundle install and caches gems

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start Jekyll server
        run: bundle exec jekyll serve --port 4001 --no-watch &
        env:
          JEKYLL_ENV: production

      - name: Wait for Jekyll to be ready
        run: |
          echo "Waiting for Jekyll on port 4001..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:4001 | grep -q "200\|301\|302"; then
              echo "Jekyll is up after ${i}s"
              break
            fi
            echo "  attempt $i/30..."
            sleep 2
          done

      - name: Run Playwright tests
        run: npm test

      - name: Write job summary
        if: always()
        run: |
          echo "## Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f tests/reports/junit/results.xml ]; then
            TESTS=$(grep -o 'tests="[0-9]*"' tests/reports/junit/results.xml | head -1 | grep -o '[0-9]*')
            FAILURES=$(grep -o 'failures="[0-9]*"' tests/reports/junit/results.xml | head -1 | grep -o '[0-9]*')
            ERRORS=$(grep -o 'errors="[0-9]*"' tests/reports/junit/results.xml | head -1 | grep -o '[0-9]*')
            PASSED=$((TESTS - FAILURES - ERRORS))
            echo "| Tests run | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | ✅ $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $( [ "$FAILURES" -gt 0 ] && echo "❌ $FAILURES" || echo "0" ) |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $( [ "$ERRORS" -gt 0 ] && echo "❌ $ERRORS" || echo "0" ) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ JUnit report not found — tests may not have run." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.sha }}
          path: tests/reports/
          retention-days: 30
