name: CI — Playwright Tests on PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Run Playwright functional tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true  # runs bundle install and caches gems

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start Jekyll server
        run: bundle exec jekyll serve --port 4001 --no-watch &
        env:
          JEKYLL_ENV: production

      - name: Wait for Jekyll to be ready
        run: |
          echo "Waiting for Jekyll on port 4001..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:4001 | grep -q "200\|301\|302"; then
              echo "Jekyll is up after ${i}s"
              break
            fi
            echo "  attempt $i/30..."
            sleep 2
          done

      - name: Run Playwright tests
        run: npm test

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/reports/
          retention-days: 7
