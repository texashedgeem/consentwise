name: Create Release on Push to Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Generate Release Notes and Tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history required for changelog and release notes

      - name: Get latest tag
        id: get_tag
        run: |
          git fetch --tags

          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
            echo "No previous tag found — starting from v0.0.0"
          fi
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Compute next version
        id: next_version
        run: |
          LATEST="${{ steps.get_tag.outputs.latest_tag }}"
          VERSION="${LATEST#v}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # feat!/fix! (breaking change) → major bump
          # feat                         → minor bump
          # everything else              → patch bump
          COMMITS=$(git log ${LATEST}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
          if echo "$COMMITS" | grep -qE "^(feat|fix)!\("; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -qE "^feat\("; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Next version: $NEW_TAG"

      - name: Create and push git tag
        run: |
          NEW_TAG="${{ steps.next_version.outputs.new_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

      # -----------------------------------------------------------------------
      # Release notes: Jira + Git reconciliation
      # Requires JIRA_TOKEN to be set as a GitHub repository secret.
      # If JIRA_TOKEN is absent, the script falls back to git-only mode.
      # -----------------------------------------------------------------------
      - name: Generate release notes
        id: release_notes
        env:
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: |
          NEW_TAG="${{ steps.next_version.outputs.new_tag }}"
          VERSION="${NEW_TAG#v}"

          echo "Running release notes generator for ${NEW_TAG}..."
          python3 scripts/generate_release_notes.py \
            --version "$VERSION" \
            --output-dir release-notes

          # Confirm outputs exist
          ls -lh "release-notes/v${VERSION}.md" "release-notes/audit/v${VERSION}.json"

          # Expose version for downstream steps
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      # Traceability gate — reads audit JSON and annotates the workflow run.
      # Warns if score is below threshold; does not fail the build.
      # Rationale: legacy repos start with low scores; the trend matters.
      # -----------------------------------------------------------------------
      - name: Traceability gate
        run: |
          VERSION="${{ steps.release_notes.outputs.version }}"
          python3 - <<'EOF'
          import json, sys, os

          version = os.environ.get("VERSION")
          path = f"release-notes/audit/v{version}.json"

          with open(path) as f:
              audit = json.load(f)

          t = audit["traceability"]
          score    = t["score_percent"]
          traced   = t["fully_traced_tickets"]
          jira_only = t["jira_only_tickets"]
          git_only  = t["git_only_tickets"]
          untracked = t["untracked_commits"]
          total     = t["total_meaningful_commits"]

          print(f"Traceability report for v{version}")
          print(f"  Score         : {score}%")
          print(f"  Fully traced  : {traced} tickets (Jira fixVersion set + git ref)")
          print(f"  Jira only     : {jira_only} tickets (no matching git commit)")
          print(f"  Git only      : {git_only} tickets (Jira fixVersion not set)")
          print(f"  Untracked     : {untracked} commits (no ticket reference)")
          print(f"  Total commits : {total} (merge commits excluded)")

          # GitHub Actions annotations
          print(f"::notice title=Traceability Score::v{version} — {score}% ({traced}/{total} commits fully traced)")

          if jira_only > 0:
              print(f"::warning title=Jira-only tickets::{jira_only} ticket(s) have fixVersion set but no git commit reference. Verify implementation evidence.")

          if git_only > 0:
              print(f"::warning title=Jira fixVersion missing::{git_only} ticket(s) referenced in git but Jira fixVersion not set. Update fixVersion in Jira.")

          if untracked > 0:
              threshold = 70
              if score < threshold:
                  print(f"::warning title=Low Traceability::{untracked} untracked commits lower score to {score}% (threshold: {threshold}%). Ensure all commits reference a Jira ticket.")
              else:
                  print(f"::notice title=Untracked Commits::{untracked} commit(s) have no ticket reference (score still above 70% threshold).")
          EOF
        env:
          VERSION: ${{ steps.release_notes.outputs.version }}

      # -----------------------------------------------------------------------
      # GitHub Release: body from the generated markdown, audit JSON attached
      # as a release asset (permanent, immutable — ISO 27001 evidence artefact).
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="${{ steps.next_version.outputs.new_tag }}"
          VERSION="${{ steps.release_notes.outputs.version }}"

          gh release create "$NEW_TAG" \
            --title "Release $NEW_TAG" \
            --notes-file "release-notes/v${VERSION}.md" \
            --latest

          # Attach audit JSON as a release asset (permanent evidence artefact)
          gh release upload "$NEW_TAG" \
            "release-notes/audit/v${VERSION}.json#Audit Log v${VERSION} (ISO 27001 / SOC1)"

      # -----------------------------------------------------------------------
      # Wiki: publish release notes as a versioned page and update the index.
      # The wiki is a separate git repo at <repo>.wiki.git.
      # GITHUB_TOKEN has write access when contents: write is set above.
      # -----------------------------------------------------------------------
      - name: Publish release notes to Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release_notes.outputs.version }}
          NEW_TAG: ${{ steps.next_version.outputs.new_tag }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${{ steps.release_notes.outputs.version }}"
          REPO="${{ github.repository }}"
          WIKI_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.wiki.git"

          # Clone wiki; initialise with a Home page if it has never been set up
          if ! git clone "$WIKI_URL" wiki 2>/dev/null; then
            mkdir wiki && cd wiki
            git init
            git remote add origin "$WIKI_URL"
            echo "# ConsentWise Wiki" > Home.md
            git add Home.md
            git commit -m "Initialise wiki"
            git push origin HEAD:master
            cd ..
          fi

          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Copy versioned release notes page
          cp "../release-notes/v${VERSION}.md" "Release-Notes-v${VERSION}.md"

          # Regenerate index page
          python3 - <<'PYEOF'
          import os, glob, re
          from pathlib import Path

          version = os.environ["VERSION"]
          pages   = sorted(glob.glob("Release-Notes-v*.md"), reverse=True)

          lines = [
              "# Release Notes",
              "",
              "Generated automatically on every production deployment.",
              "Each release includes Jira + Git traceability and an ISO 27001 audit log.",
              "",
              "| Version | Date | Page |",
              "|---|---|---|",
          ]
          for page in pages:
              m = re.search(r'Release-Notes-v([\d.]+)\.md', page)
              if not m:
                  continue
              ver  = m.group(1)
              content = Path(page).read_text()
              date_m  = re.search(r'Generated: (\d{4}-\d{2}-\d{2})', content)
              date    = date_m.group(1) if date_m else "—"
              lines.append(f"| v{ver} | {date} | [[Release-Notes-v{ver}]] |")

          lines += ["", f"_Last updated: v{version}_", ""]
          Path("Release-Notes.md").write_text("\n".join(lines))
          print(f"Wiki index updated — {len(pages)} release(s) listed")
          PYEOF

          git add "Release-Notes-v${VERSION}.md" "Release-Notes.md"
          git diff --cached --quiet && echo "No wiki changes" && exit 0
          git commit -m "Release notes v${VERSION}"
          git push origin HEAD:master

      # -----------------------------------------------------------------------
      # Upload both artefacts to Actions for pipeline-level retention.
      # 400 days = maximum on GitHub. For long-term compliance archival,
      # export to external storage (S3 / Azure Blob) via a separate workflow.
      # -----------------------------------------------------------------------
      - name: Upload release artefacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artefacts-${{ steps.next_version.outputs.new_tag }}
          path: |
            release-notes/v${{ steps.release_notes.outputs.version }}.md
            release-notes/audit/v${{ steps.release_notes.outputs.version }}.json
          retention-days: 400

      # -----------------------------------------------------------------------
      # Step summary — visible in the Actions run UI
      # -----------------------------------------------------------------------
      - name: Write step summary
        env:
          VERSION: ${{ steps.release_notes.outputs.version }}
          REPO: ${{ github.repository }}
          NEW_TAG: ${{ steps.next_version.outputs.new_tag }}
        run: |
          python3 - <<'EOF'
          import json, os

          version = os.environ["VERSION"]
          tag     = os.environ["NEW_TAG"]
          repo    = os.environ["REPO"]
          path    = f"release-notes/audit/v{version}.json"

          with open(path) as f:
              audit = json.load(f)

          t = audit["traceability"]
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")

          with open(summary_path, "a") as f:
              f.write(f"## Release {tag}\n\n")
              f.write("| Metric | Value |\n|---|---|\n")
              f.write(f"| Traceability score | **{t['score_percent']}%** |\n")
              f.write(f"| Fully traced tickets | {t['fully_traced_tickets']} |\n")
              f.write(f"| Jira-only tickets | {t['jira_only_tickets']} |\n")
              f.write(f"| Git-only tickets | {t['git_only_tickets']} |\n")
              f.write(f"| Untracked commits | {t['untracked_commits']} |\n")
              f.write(f"| Total commits | {t['total_meaningful_commits']} |\n")
              f.write(f"\nAudit log attached to [Release {tag}]")
              f.write(f"(https://github.com/{repo}/releases/tag/{tag}) as `Audit Log {tag}`.\n")
          EOF
