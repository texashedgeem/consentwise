title: ConsentWise
description: Open Banking Live Account Testing
url: "https://consentwise.io"
baseurl: ""

# Collections
collections:
  services:
    output: true
    permalink: /:name/
  videos:
    output: true
    permalink: /videos/:name/

defaults:
  - scope:
      path: ""
      type: services
    values:
      layout: service
  - scope:
      path: ""
      type: videos
    values:
      layout: video

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md

# Markdown
markdown: kramdown
