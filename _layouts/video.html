---
layout: default
---

<section class="ts-2 video-hero">
  <div class="table" style="width: 100%; height: 100%;">
    <div class="middle">
      <div class="main-page">
        <h1 data-aos="zoom-in-up" data-aos-duration="800" class="white m-0">{{ page.title }}</h1>
      </div>
    </div>
  </div>
</section>

<section class="video-embed-section">
  <div class="main-page">
    <div class="main-spacing">
      <div class="video-embed-wrapper">
        <iframe
          src="https://www.youtube.com/embed/{{ page.youtube_id }}?rel=0{% if page.youtube_start %}&start={{ page.youtube_start }}{% endif %}"
          title="{{ page.title }}"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>
    </div>
  </div>
</section>

<section>
  <div class="main-page">
    <div class="main-spacing">
      <div class="auto mw-1000">
        <p>{{ page.description }}</p>
        {% if page.tags %}
        <div class="video-tags">
          {% for tag in page.tags %}
          <span class="video-tag">{{ tag }}</span>
          {% endfor %}
        </div>
        {% endif %}
      </div>
    </div>
  </div>
</section>

<section>
  <div class="bottom-cta">
    <div data-aos="zoom-in-up" data-aos-duration="800" class="main-page">
      <div class="main-padding mt">
        <div class="auto text-center">
          <h3 class="white">Get in touch with one of our team today</h3>
          <a class="btn pink-btn mt-es mb-0" href="https://open-banking.atlassian.net/servicedesk/customer/portal/1">Contact Us</a>
        </div>
      </div>
    </div>
  </div>
</section>
